<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Controle de Almoxarifado</h1>
        <div id="mensagem" class="mensagem"></div>

        <div class="formulario">
            <input
                type="text"
                id="input-nome"
                placeholder="Nome do material"
            >

            <input
                type="number"
                id="input-quantidade"
                placeholder="Quantidade"
            >

            <button id="btn-cadastrar">
                Cadastrar
            </button>
        </div>

        <button id="btn-mostrar">
            Ver Materiais
        </button>

        <table id="lista-materiais" style="display: none;">
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>
    <div id="modal-sucesso" class="modal">
    <div class="modal-conteudo">
        <h3>Cadastro realizado</h3>
        <p>Material cadastrado com sucesso!</p>
        <button id="btn-ok">OK</button>
    </div>
</div>

    <script src="main.js"></script>
</body>
</html>
