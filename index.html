<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Controle de Almoxarifado</h1>

        <div class="formulario">
            <input
                type="text"
                id="input-nome"
                placeholder="Nome do material"
            >

            <input
                type="number"
                id="input-quantidade"
                placeholder="Quantidade"
            >

            <button id="btn-cadastrar">
                Cadastrar
            </button>
        </div>

        <table id="lista-materiais">
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
